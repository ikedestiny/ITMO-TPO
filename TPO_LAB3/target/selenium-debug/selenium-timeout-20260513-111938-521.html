<html lang="ru"><head>
  <meta charset="utf-8">
  <title>tutu.ru functional fixture</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 32px; line-height: 1.4; }
    input, button { display: block; margin: 8px 0; padding: 8px; min-width: 220px; }
    section { margin-top: 16px; }
  </style>
</head>
<body data-fixture="tutu">
<h1>Аренда авто</h1>
<form aria-label="Аренда авто">
  <label>Город <input name="city" placeholder="Город получения"></label>
  <label>Начало <input name="fromDate" placeholder="Получение"></label>
  <label>Окончание <input name="toDate" placeholder="Возврат"></label>
  <button type="button">Найти</button>
</form>
<section id="carResults">
  <h2>Аренда авто</h2>
  <p>Найдены варианты авто и машины для бронирования.</p>
  <button type="button">Выбрать автомобиль</button>
</section>


</body></html>
